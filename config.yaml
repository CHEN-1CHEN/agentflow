# AgentFlow Configuration
llm:
  provider: "openai"           # openai | ollama | custom
  model: "gpt-4o"             # gpt-4o, gpt-4-turbo, qwen-plus, etc.
  api_key: "${OPENAI_API_KEY}" # env variable or literal
  base_url: "https://api.openai.com/v1"  # change for domestic proxies
  temperature: 0.7
  max_tokens: 4096

rag:
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  chunk_size: 512
  chunk_overlap: 64
  vector_store: "chromadb"    # chromadb | faiss
  persist_dir: "./data/vector_store"
  top_k: 5

agents:
  planner:
    model: "gpt-4o"
    temperature: 0.3
    max_plan_steps: 10

  executor:
    model: "gpt-4o"
    temperature: 0.5
    max_tool_calls: 8

  reviewer:
    model: "gpt-4o"
    temperature: 0.2
    review_passes: 3

memory:
  short_term:
    max_turns: 20
  long_term:
    enabled: true
    persist_dir: "./data/memory_store"
    embedding_model: "sentence-transformers/all-MiniLM-L6-v2"

tools:
  search:
    enabled: true
    api: "duckduckgo"
  calculator:
    enabled: true
  python_executor:
    enabled: true
    timeout: 30
    sandbox: true
  file_operations:
    enabled: true
